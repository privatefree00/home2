    <style>
        body { padding: 0px; margin: 0px; background-color: black; }

        header {
            position: relative;
            background-color: black;
            height: 100vh;
            min-height: 25rem;
            width: 100%;
            overflow: hidden;
        }

        /* PERBAIKAN CSS VIDEO AGAR SINKRON DENGAN CLASS */
        header .video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 0;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
        }

        header .container { position: relative; z-index: 2; }

        header .overlay {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Opacity disesuaikan biar glass cakep */
            z-index: 1;
        }

        /* EFEK GLASSMORPHISM UNTUK TOMBOL */
        .btn-glass {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 15px !important;
            color: white !important;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
            transition: 0.3s;
        }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.2) !important; }

        /* STYLE BOX TIMER */
        .timer-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px 30px;
            display: inline-block;
            margin-top: 20px;
        }
        .timer-digits { font-size: 2.2rem; font-weight: bold; letter-spacing: 3px; }
        .timer-label { font-size: 0.6rem; opacity: 0.8; letter-spacing: 1px; }

        @media (pointer: coarse) and (hover: none) {
            header { /* background: url('video/girl-dancing.mp4') black no-repeat center center scroll; */ }
        }
    </style>
</head>
<body>
    <header>
        <div class="overlay"></div>
        <video class="video" loop autoplay muted playsinline preload="auto">
            <source src="https://cdn.jsdelivr.net/gh/myclair4/web-media/video9.mp4" type="video/mp4">
        </video>
        
        <div class="container h-100">
            <div class="d-flex h-100 text-center align-items-center">
                <div class="w-100 text-white">
                    
                   
                    
                  

                    <p class="mt-4 mb-1" style="font-size: 0.9rem;">live now</p>
                    <div class="timer-glass">
                        <div class="timer-digits" id="timer">00 : 03 : 00</div>
                        <div class="d-flex justify-content-between px-2">
                            <span class="timer-label">HOURS</span>
                            <span class="timer-label">MINUTES</span>
                            <span class="timer-label">SECONDS</span>
                        </div>
                         <a href="https://all.biolinksx.my.id/" class="btn-glass" onclick="return bukaSurvey(this);">
                        <span><img src="https://iili.io/H7gEXZN.png" style="width: 25px"> LIVECAM</span>
                        <span>&gt;</span>
                    </a>
                    
                    <a href="https://all.biolinksx.my.id/" class="btn-glass" onclick="return bukaSurvey(this);">
                        <span><img src="https://iili.io/H7gEXZN.png" style="width: 25px"> FREEVIDEO</span>
                        <span>&gt;</span>
                    </a>
                    </div>

                </div>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="text/javascript">
      function bukaSurvey(el) {
        var sidBaru = "t6~" + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
        var linkAsli = el.href;
        var penghubung = linkAsli.indexOf('?') !== -1 ? "&" : "?";
        var urlFinal = linkAsli + penghubung + "sid=" + sidBaru;
        var win = window.open(urlFinal, '_blank');
        if (win) { win.opener = null; } else { window.location.href = urlFinal; }
        return false;
      }
    </script>

    <script type="text/javascript">
      function disableSelection(e) {
          if (typeof e.onselectstart != "undefined") e.onselectstart = function() { return false };
          else if (typeof e.style.MozUserSelect != "undefined") e.style.MozUserSelect = "none";
          else e.onmousedown = function() { return false };
          e.style.cursor = "default"
      }
      window.onload = function() { disableSelection(document.body) }
    </script>

    <script type="text/javascript">
      function mousedwn(e) {
          try { if (event.button == 2 || event.button == 3) return false } 
          catch (e) { if (e.which == 3) return false }
      }
      document.oncontextmenu = function() { return false };
      document.ondragstart = function() { return false };
      document.onmousedown = mousedwn;
    </script>

    <script>
        let totalTime = 180; 
        setInterval(() => {
            if(totalTime > 0) {
                totalTime--;
                let m = Math.floor(totalTime / 60);
                let s = totalTime % 60;
                document.getElementById('timer').innerText = `00 : ${String(m).padStart(2, '0')} : ${String(s).padStart(2, '0')}`;
            }
        }, 1000);
    </script>
</body>
